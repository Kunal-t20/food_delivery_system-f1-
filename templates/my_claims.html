<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Claims | Food Redistribution System</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f7f8fc;
            margin: 0;
            padding: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        table {
            width: 90%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .status {
            font-weight: bold;
        }
        .Pending { color: orange; }
        .Requested { color: blue; }
        .Delivered { color: green; }
    </style>
</head>
<body>
    <h2>My Claims</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Food Item</th>
            <th>Status</th>
            <th>Requested At</th>
            <th>Delivered At</th>
        </tr>
        {% for claim in claims %}
        <tr>
            <td>{{ claim['id'] }}</td>
            <td>{{ claim['food_name'] }}</td>
            <td class="status {{ claim['status'] }}">{{ claim['status'] }}</td>
            <td>{{ claim['requested_at'] or '-' }}</td>
            <td>{{ claim['delivered_at'] or '-' }}</td>
        </tr>
        {% else %}
        <tr><td colspan="5">No claims found.</td></tr>
        {% endfor %}
    </table>
</body>
</html>
