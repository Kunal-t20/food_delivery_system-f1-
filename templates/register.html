<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Food Redistribution</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f8; margin: 0; }
        .container { max-width: 400px; margin: 80px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 10px; font-weight: 500; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; margin-top: 15px; background-color: #4CAF50; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .login-link { text-align: center; margin-top: 15px; display: block; color: #333; text-decoration: none; }
        .login-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Account</h2>
        <form method="POST">
            <label for="fullname">Full Name</label>
            <input type="text" name="fullname" required>

            <label for="email">Email</label>
            <input type="email" name="email" required>

            <label for="password">Password</label>
            <input type="password" name="password" required>

            <label for="role">Select Role</label>
            <select name="role" required>
                <option value="donor">Donor</option>
                <option value="recipient">Recipient</option>
            </select>

            <button type="submit">Register</button>
        </form>
        <a href="{{ url_for('login') }}" class="login-link">Already have an account? Login</a>
    </div>
</body>
</html>
